services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"

  sensor-simulator:
    build: ./simulator
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
    restart: on-failure

  bayesian-scorer:
    build: ./scorer
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
      DB_PATH:      /data/sensor.duckdb
    volumes:
      - db-data:/data
    restart: on-failure

  streamlit-hitl:
    build: ./dashboard
    depends_on:
      - kafka
    ports:
      - "8501:8501"
    environment:
      KAFKA_BROKER: kafka:9092
      DB_PATH:      /data/sensor.duckdb
    volumes:
      - db-data:/data
    restart: on-failure

volumes:
  db-data:
